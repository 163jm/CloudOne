name: build and release with docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号，例如 v1.2.0'
        required: true
        default: 'v1.1.0'

jobs:
  # ===================== 构建二进制 =====================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Cache cargo registry (shared)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cloudone-registry
          save-if: false

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            musl-tools

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for Linux amd64 (musl static)
        env:
          CC: musl-gcc
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build for Linux arm64 (musl static)
        env:
          # 使用独立的 target 目录，与 amd64 构建产物完全隔离
          # 避免 proc-macro .so / build-script 二进制的 GLIBC 版本冲突
          CARGO_TARGET_DIR: target-arm64
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Prepare release binaries
        run: |
          cp target/x86_64-unknown-linux-musl/release/cloudone cloudone-linux-amd64
          cp target-arm64/aarch64-unknown-linux-musl/release/cloudone cloudone-linux-arm64
          chmod +x cloudone-linux-amd64 cloudone-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudone-binaries
          path: |
            cloudone-linux-amd64
            cloudone-linux-arm64
          if-no-files-found: error

  # ===================== 发布 Release =====================
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudone-binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: CloudOne ${{ github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            cloudone-linux-amd64
            cloudone-linux-arm64

  # ===================== 构建并推送 Docker 镜像 =====================
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudone-binaries
          path: .

      - name: Set up QEMU（多平台支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudone:${{ github.event.inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudone:latest

  docker-argo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudone-binaries
          path: .

      - name: Set up QEMU（多平台支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile_argo
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudone:argo
