name: build and release with docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号，例如 v1.2.0'
        required: true
        default: 'v1.1.0'

jobs:
  # ===================== 构建二进制 =====================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cloudone-release

      - name: Install Linux arm64 linker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build for Linux amd64
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build for Linux arm64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Prepare release binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/cloudone cloudone-linux-amd64
          cp target/aarch64-unknown-linux-gnu/release/cloudone cloudone-linux-arm64
          chmod +x cloudone-linux-amd64 cloudone-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudone-binaries
          path: |
            cloudone-linux-amd64
            cloudone-linux-arm64
          if-no-files-found: error

  # ===================== 发布 Release =====================
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudone-binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: CloudOne ${{ github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            cloudone-linux-amd64
            cloudone-linux-arm64

  # ===================== 构建并推送 Docker 镜像 =====================
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudone-binaries
          path: .

      - name: Set up QEMU（多平台支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudone:${{ github.event.inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudone:latest

  docker-argo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudone-binaries
          path: .

      - name: Set up QEMU（多平台支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile_argo
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudone:argo
