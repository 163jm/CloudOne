name: pre-build

on:
  workflow_dispatch: # 点击按钮即触发，无需手动输入版本号

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Release Tag
        id: set_tag
        run: |
          # 生成北京时间戳作为版本号
          TAG_NAME=$(TZ='Asia/Shanghai' date +'%Y.%m.%d-%H%M')
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install --prefer-offline=false
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cloudone-pre-release

      # ================= 修改部分开始 =================
      - name: Install Cross-rs
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for Linux arm64 (musl static via cross)
        run: cross build --release --target aarch64-unknown-linux-musl
      # ================= 修改部分结束 =================

      - name: Prepare release binary
        run: |
          cp target/aarch64-unknown-linux-musl/release/cloudone cloudone-linux-arm64
          chmod +x cloudone-linux-arm64

      - name: Upload binaries to temporary storage
        uses: actions/upload-artifact@v4
        with:
          name: raw-binaries
          path: |
            cloudone-linux-arm64
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须拥有写权限才能创建 Release

    steps:
      - name: Download binaries from build job
        uses: actions/download-artifact@v4
        with:
          name: raw-binaries
          path: ./release_files

      - name: Ensure Execution Permissions
        run: chmod +x ./release_files/cloudone-*

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: CloudOne Pre-release ${{ needs.build.outputs.release_tag }}
          prerelease: true # 标记为预发布
          draft: false
          generate_release_notes: true
          files: |
            ./release_files/cloudone-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
